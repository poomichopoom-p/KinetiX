                <span class="marquee-item">SALOMON <span class="marquee-dot"></span></span>
                <span class="marquee-item">MIZUNO <span class="marquee-dot"></span></span>
                <span class="marquee-item">SAUCONY <span class="marquee-dot"></span></span>
                <span class="marquee-item">NIKE <span class="marquee-dot"></span></span>

            </div>
        </div>

        <!-- หัวข้อ -->
        <div class="mt-20 ml-15 w-fit h-fit text-white">
             <div class="">
                 <span class="text-[#C3FF51] text-sm">———— แบรนด์พันธมิตร</span>
            </div>
            <div>
                <span class="text-5xl">เลือกแบรนด์ที่ใช่</span>
            </div>
        </div>

            <div class="mt-15 w-fit h-fit flex gap-10">
                <div class="w-50 h-50 bg-[rgb(248,250,244,0.05)] text-white flex flex-col items-center justify-center gap-5">
                    <img src="./shoe logo/Nike.jpg" class="w-10 h-10 rounded-md">
                    <span>Nike</span>
                    <span>10 รุ่น</span>
                </div>
                <div class="w-50 h-50 bg-[rgb(248,250,244,0.05)] text-white flex flex-col items-center justify-center gap-5">
                    <img src="./shoe logo/Adidas.jpg" class="w-10 h-10 rounded-md">
                    <span>Adidas</span>
                    <span>10 รุ่น</span>

                    <img src="./shoe logo/ASICS.jpg" class="w-10 h-10 rounded-md">

                    <span>New Balance</span>
                    <span>10 รุ่น</span>
